workflows:
  ios-release:
    name: iOS Release

    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      xcode: latest

      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.lazarchuk.pullupheropro

      vars:
        BUNDLE_ID: "com.lazarchuk.pullupheropro"
        XCODE_PROJECT: "PullUpHero.xcodeproj"
        XCODE_SCHEME: "PullUpHero"

    scripts:
      - name: Show files
        script: |
          pwd
          ls -la
          find . -name "*.xcodeproj"
          find . -name "*.pbxproj"
          find . -name "*.swift"
          find . -name "*.html"
          find . -name "*.js"
          find . -name "*.css"

      - name: Set up code signing
        script: |
          xcode-project use-profiles

      - name: Show signing after profile setup
        script: |
          xcodebuild -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -showBuildSettings | grep -E "PRODUCT_BUNDLE_IDENTIFIER|DEVELOPMENT_TEAM|CODE_SIGN_STYLE|CODE_SIGN_IDENTITY|PROVISIONING_PROFILE_SPECIFIER"

      - name: Build ipa
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"

      - name: Inspect ipa
        script: |
          ls -lah build/ios/ipa || true
          unzip -l build/ios/ipa/*.ipa | head -120 || true

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      email:
        recipients:
          - dima@lazarchuk.com
        notify:
          success: true
          failure: true
